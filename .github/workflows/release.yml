---
name: build-package-release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build Python Distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Verify the tag was cut from main
        run: |
          if ! git branch --remotes --contains "${{ github.sha }}" | grep -qx '  origin/main'; then
            echo "::error::Tag ${{ github.ref_name }} does not point at a commit on main."
            exit 1
          fi

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.10.0
        with:
          cache: true

      - name: Build source and wheel distributions
        run: pixi run build

      - name: Store the distribution packages
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: dist/

  pypi-publish:
    name: Upload release to PyPI
    needs:
      - build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/catalystcoop.cheshire
    permissions:
      id-token: write
    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-publish:
    name: Release package on GitHub
    needs:
      - pypi-publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/
      - name: Sign dist with Sigstore
        uses: sigstore/gh-action-sigstore-python@v3.4.0
        with:
          inputs: ./dist/*.tar.gz ./dist/*.whl
      - name: Upload artifact signatures to GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          gh release create '${{ github.ref_name }}' ./dist/*.tar.gz ./dist/*.whl
          --generate-notes
          --repo '${{ github.repository }}'
