---
name: build-package-release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build Python Distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Verify the tag points at the current HEAD of main
        # Checking ancestry (e.g. `git branch --remotes --contains`) isn't enough --
        # any commit reachable from main passes that check, including a stale local
        # main that's behind origin. Require an exact match against origin/main's
        # current tip instead, so tagging from a stale local checkout fails loudly.
        run: |
          main_sha="$(git rev-parse origin/main)"
          if [[ "${{ github.sha }}" != "$main_sha" ]]; then
            echo "::error::Tag ${{ github.ref_name }} (${{ github.sha }}) does not point at the current HEAD of main ($main_sha). Pull the latest main and re-tag."
            exit 1
          fi

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.10.0
        with:
          cache: true

      - name: Build source and wheel distributions
        run: pixi run build

      - name: Store the distribution packages
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: dist/

  pypi-publish:
    name: Upload release to PyPI
    needs:
      - build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/catalystcoop.cheshire
    permissions:
      id-token: write
    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-publish:
    name: Release package on GitHub
    needs:
      - pypi-publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/
      - name: Sign dist with Sigstore
        uses: sigstore/gh-action-sigstore-python@v3.4.0
        with:
          inputs: ./dist/*.tar.gz ./dist/*.whl
      - name: Upload artifact signatures to GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          gh release create '${{ github.ref_name }}' ./dist/*.tar.gz ./dist/*.whl
          --generate-notes
          --repo '${{ github.repository }}'
