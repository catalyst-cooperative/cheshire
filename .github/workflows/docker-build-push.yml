---
name: docker-build-push

# Triggered by the pytest workflow completing (for every push and PR, since that's
# what pytest.yml itself triggers on), rather than push/pull_request directly, so that
# an image is only ever pushed once the test suite has actually passed for that commit.
on:
  workflow_run:
    workflows: ["pytest"]
    types: [completed]

jobs:
  push_to_registry:
    name: Build Docker image and push to Docker Hub
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout the commit that pytest just tested
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0 # Need branch/tag history for the push-eligibility check below.

      - name: Decide whether this ref should be pushed to Docker Hub
        # Only push images built from main or from a version tag -- not every branch
        # or PR -- to avoid cluttering Docker Hub and burning CI minutes on images
        # nobody will ever pull. Every ref still gets a build, just not a push, so
        # Dockerfile breakage is still caught everywhere.
        id: should-push
        run: |
          if [ "${{ github.event.workflow_run.head_branch }}" = "main" ] \
            || git describe --tags --exact-match HEAD >/dev/null 2>&1; then
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "push=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Docker Metadata
        id: docker_metadata
        uses: docker/metadata-action@v6.1.0
        with:
          images: catalystcoop/cheshire-docker-build-push
          # Read the ref/sha from the commit actually checked out above: this workflow
          # runs via `workflow_run`, so the default GitHub Actions event context
          # doesn't reflect the branch/tag that pytest just tested.
          context: git
          flavor: |
            latest=auto
          tags: |
            type=ref,event=branch
            type=ref,event=tag

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0

      - name: Login to DockerHub
        if: ${{ steps.should-push.outputs.push == 'true' }}
        uses: docker/login-action@v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image and push to Docker Hub
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          file: docker/Dockerfile
          push: ${{ steps.should-push.outputs.push == 'true' }}
          tags: ${{ steps.docker_metadata.outputs.tags }}
          labels: ${{ steps.docker_metadata.outputs.labels }}
