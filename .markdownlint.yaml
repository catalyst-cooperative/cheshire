# Configuration for markdownlint-cli2: https://github.com/DavidAnson/markdownlint-cli2
---
# Line length is handled by mdformat/prettier line wrapping, not worth enforcing here.
MD013: false
# Allow inline HTML (e.g. <!-- comments -->, <picture> in badges).
MD033: false
# mdformat-mkdocs indents nested list content 4 spaces (not markdownlint's default of
# 2), since Python-Markdown -- which Zensical's rendering is built on -- needs 4
# spaces to reliably parse wrapped content as still belonging to a list item.
MD007:
  indent: 4
# Allow repeated subheadings (e.g. "### What's New?") across different release
# sections in docs/release_notes.md; only flag duplicates within the same section.
MD024:
  siblings_only: true
