---
repos:
  # Quick content checks based on grepping for python specific patterns:
  - repo: https://github.com/pre-commit/pygrep-hooks
    rev: v1.10.0
    hooks:
      - id: python-use-type-annotations # Use annotations not old-style type comments
      - id: python-check-blanket-noqa # Require noqa comments to specify an error code.
      - id: python-check-blanket-type-ignore # Require type: ignore to specify a code.
      - id: python-no-log-warn # Use logger.warning() instead of deprecated logger.warn()
      - id: python-no-eval # Flag uses of the eval() builtin.
      - id: text-unicode-replacement-char # Catch mangled-encoding artifacts.

  # Other file formatting, plus common Git mistakes & text file standardization:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files # Don't accidentally commit giant files.
      - id: check-merge-conflict # Watch for lingering merge markers.
      - id: check-yaml # Validate all YAML files.
      - id: check-toml
      - id: check-json # Validate all JSON files, including Jupyter notebooks.
        # check-json is strict json.load() with no JSONC (comments, trailing
        # commas) support and no flag to add it, so exclude files that are JSONC
        # by convention rather than weakening validation for real JSON files.
        exclude: ^(\.devcontainer/.*devcontainer\.json|\.vscode/.*\.json)$
      - id: check-case-conflict # Avoid case sensitivity in file names.
      - id: check-illegal-windows-names # Avoid filenames that break on Windows.
      - id: destroyed-symlinks # Catch symlinks (e.g. CLAUDE.md) silently replaced with copies.
      - id: debug-statements # Watch for lingering debugger calls.
      - id: detect-private-key # Don't accidentally commit private keys.
      - id: trailing-whitespace # Strip trailing whitespace, beyond what ruff covers in .py files.
      - id: mixed-line-ending # Only newlines, no line-feeds.
        args: ["--fix=lf"]
      - id: name-tests-test # Follow PyTest naming convention.
      - id: end-of-file-fixer
      - id: no-commit-to-branch # Discourage committing directly to main; PRs only.
        args: ["--branch", "main"]

  ########################################################################################
  # Formatters: hooks that re-write Python, TOML, YAML, and Markdown files
  ########################################################################################
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.22
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/rbubley/mirrors-prettier
    rev: v3.9.5
    hooks:
      - id: prettier
        types_or: [yaml]

  - repo: https://github.com/ComPWA/taplo-pre-commit
    rev: v0.9.3
    hooks:
      - id: taplo-format

  - repo: https://github.com/hukkin/mdformat
    rev: 1.0.0
    hooks:
      - id: mdformat
        additional_dependencies:
          - mdformat-gfm
          # Without this, mdformat mangles zensical/MkDocs-flavored markdown syntax,
          # e.g. escaping the "<" in docs/index.md's "--8<--" snippet-include line.
          - mdformat-mkdocs
          # Without this, mdformat doesn't recognize YAML front matter (used by the
          # GitHub issue/PR templates) and reformats its "---" delimiters into
          # thematic breaks, corrupting the front matter and confusing markdownlint.
          - mdformat-frontmatter

  ########################################################################################
  # Linters: hooks that check but don't alter Python, Markdown, & Dockerfiles
  ########################################################################################
  # Check Markdown files for style issues
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.23.1
    hooks:
      - id: markdownlint-cli2

  # Lint Dockerfiles for errors and to ensure best practices
  - repo: https://github.com/AleksaC/hadolint-py
    rev: v2.14.0
    hooks:
      - id: hadolint

  # Lint shell scripts for common bugs and portability issues
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck

  # Check Github Actions
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  ########################################################################################
  # Custom local hooks
  ########################################################################################
  - repo: local
    hooks:
      # clear outputs from Jupyter notebooks
      - id: nb-output-clear
        name: nb-output-clear
        stages: [pre-commit]
        language: system
        verbose: false
        pass_filenames: false
        always_run: true
        entry: find notebooks \( -name \*.ipynb -not -name \*checkpoint.ipynb \) -type f -exec jupyter nbconvert --clear-output {} \;
      # Run the unit tests
      - id: pytest
        name: pytest
        stages: [pre-commit]
        language: system
        verbose: false
        pass_filenames: false
        always_run: true
        entry: pixi run test
      # Type check with ty. This has to be a local hook rather than the official
      # astral-sh/ty-pre-commit repo: that hook shells out to `uv check`, which needs
      # network access to resolve the project's dependencies, and pre-commit.ci
      # disables network access during hook execution. Running it through the pixi
      # environment (which already has every dependency installed) avoids that
      # entirely -- but since pre-commit.ci can't run this hook either way (see
      # `ci.skip` below), it's enforced in CI via a dedicated step in pytest.yml
      # instead.
      - id: ty
        name: ty
        stages: [pre-commit]
        language: system
        verbose: false
        pass_filenames: false
        always_run: true
        entry: pixi run lint-ty

# Configuration for pre-commit.ci
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit.com hooks

    For more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: main
  autoupdate_commit_msg: "[pre-commit.ci] pre-commit autoupdate"
  autoupdate_schedule: weekly
  skip: [pytest, nb-output-clear, ty]
  submodules: false
